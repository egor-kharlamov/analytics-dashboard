<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1a1a2e"/>
            <stop offset="100%" style="stop-color:#16213e"/>
        </linearGradient>
        <linearGradient id="b1" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#6366f1"/>
            <stop offset="100%" style="stop-color:#4338ca"/>
        </linearGradient>
        <linearGradient id="b2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#818cf8"/>
            <stop offset="100%" style="stop-color:#6366f1"/>
        </linearGradient>
        <linearGradient id="b3" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#a5b4fc"/>
            <stop offset="100%" style="stop-color:#818cf8"/>
        </linearGradient>
    </defs>

    <circle cx="200" cy="200" r="200" fill="url(#bg)"/>


    <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
        <line x1="80" y1="150" x2="320" y2="150"/>
        <line x1="80" y1="190" x2="320" y2="190"/>
        <line x1="80" y1="230" x2="320" y2="230"/>
        <line x1="80" y1="270" x2="320" y2="270"/>
    </g>


    <rect x="95"  y="230" width="36" height="70" rx="5" fill="url(#b1)" opacity="0.7"/>
    <rect x="148" y="190" width="36" height="110" rx="5" fill="url(#b2)" opacity="0.85"/>
    <rect x="201" y="210" width="36" height="90" rx="5" fill="url(#b1)" opacity="0.7"/>
    <rect x="254" y="160" width="36" height="140" rx="5" fill="url(#b3)"/>

    <!-- Trend line -->

    <polyline
            points="113,228 166,188 219,208 272,158"
            fill="none"
            stroke="#e0e7ff"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            opacity="0.6"
    />

    <circle cx="113" cy="228" r="4" fill="#e0e7ff" opacity="0.7"/>
    <circle cx="166" cy="188" r="4" fill="#e0e7ff" opacity="0.7"/>
    <circle cx="219" cy="208" r="4" fill="#e0e7ff" opacity="0.7"/>
    <circle cx="272" cy="158" r="5" fill="#ffffff" opacity="0.95"/>
